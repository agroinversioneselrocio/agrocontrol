<div id="activity-list-view"></div>

<script>
// ============================================================
// ACTIVITIES VIEW — scope global correcto
// ============================================================

// ── Renderer principal ────────────────────────────────────────
function renderActivitiesView(container) {
  container.innerHTML =
    '<div style="display:flex; justify-content:space-between; ' +
      'align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:12px;">' +
      '<h3 style="font-family:Manrope; font-size:22px; font-weight:700; margin:0;">' +
        'Actividades' +
      '</h3>' +
      '<div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">' +
        '<select id="filter-estado-actividad" ' +
          'onchange="filterActividades()" ' +
          'style="padding:8px 12px; border-radius:8px; border:1px solid #e3f3d2; ' +
            'background:white; font-size:14px; color:var(--text-dark);">' +
          '<option value="">Todos los estados</option>' +
          '<option value="pendiente">Pendiente</option>' +
          '<option value="en_proceso">En Proceso</option>' +
          '<option value="completada">Completada</option>' +
          '<option value="anulada">Anulada</option>' +
        '</select>' +
        '<button class="btn btn-primary" onclick="showForm(\'actividades\')">' +
          '<span class="material-symbols-outlined">add</span> Nueva Actividad' +
        '</button>' +
      '</div>' +
    '</div>' +
    '<div id="activities-list-content">' +
      '<div style="text-align:center; padding:40px;">' +
        '<div class="spinner" style="margin:0 auto;"></div>' +
      '</div>' +
    '</div>';

  return loadActividades();
}

// ── Carga con filtro opcional ─────────────────────────────────
async function loadActividades(estado) {
  var listContainer = document.getElementById('activities-list-content');
  if (!listContainer) return;

  listContainer.innerHTML =
    '<div style="text-align:center; padding:40px;">' +
      '<div class="spinner" style="margin:0 auto;"></div>' +
    '</div>';

  try {
    var args = (estado && estado !== '') ? { estado_actividad: estado } : null;
    var result = await runServer('webAppListActividades', args);
    var actividades = (result && result.ok) ? (result.data || []) : [];
    _renderActividadesList(actividades, listContainer);
  } catch (err) {
    // FIX: escapar err.message antes de inyectar con innerHTML
    var msg = escapeHtml(err ? (err.message || String(err)) : 'Error desconocido');
    listContainer.innerHTML =
      '<div style="text-align:center; padding:40px; color:#ba1a1a;">' +
        '<span class="material-symbols-outlined" ' +
          'style="font-size:40px; display:block; margin-bottom:8px;">error</span>' +
        'Error al cargar actividades: ' + msg +
      '</div>';
  }
}

// ── Filtro por estado ─────────────────────────────────────────
function filterActividades() {
  var select = document.getElementById('filter-estado-actividad');
  var estado = select ? select.value : '';
  loadActividades(estado || null);
}

// ── Render de la lista ────────────────────────────────────────
function _renderActividadesList(actividades, container) {
  if (!actividades || actividades.length === 0) {
    container.innerHTML =
      '<div style="text-align:center; padding:60px; color:var(--text-muted);">' +
        '<span class="material-symbols-outlined" ' +
          'style="font-size:48px; display:block; margin-bottom:12px;">assignment</span>' +
        '<p style="font-size:16px; font-weight:600;">No hay actividades registradas</p>' +
        '<p style="font-size:13px; margin-top:4px;">' +
          'Crea la primera actividad con el botón de arriba' +
        '</p>' +
      '</div>';
    return;
  }

  var html = '<div style="display:grid; gap:10px;">';

  actividades.forEach(function(a) {
    // FIX: escapar todos los datos de usuario antes de inyectar con innerHTML
    var id     = escapeHtml(a.id_actividad    || '');
    var nombre = escapeHtml(a.nombre_actividad || 'Sin nombre');
    var estado = escapeHtml(a.estado_actividad || '');
    var tipo   = escapeHtml(a.tipo_actividad   || '');
    var campo  = escapeHtml(a.campo_id         || '');
    var fecha  = escapeHtml(a.fecha_programada || '');
    var costo  = parseFloat(a.costo_total      || 0);

    html +=
      '<div class="dash-activity-card" ' +
        'onclick="viewActivityDetail(\'' + id + '\')">' +
        '<div style="flex:1; min-width:0;">' +
          '<div style="display:flex; align-items:center; gap:10px; ' +
            'margin-bottom:6px; flex-wrap:wrap;">' +
            '<span style="font-weight:700; font-size:15px;">' + nombre + '</span>' +
            '<span class="badge badge--' + estado + '">' + (estado || '-') + '</span>' +
          '</div>' +
          '<div style="font-size:12px; color:var(--text-muted); ' +
            'display:flex; gap:14px; flex-wrap:wrap;">' +
            (tipo  ? '<span>📋 ' + tipo  + '</span>' : '') +
            (campo ? '<span>🌿 ' + campo + '</span>' : '') +
            (fecha ? '<span>📅 ' + fecha + '</span>' : '') +
            (costo ? '<span>💰 S/ ' + costo.toFixed(2) + '</span>' : '') +
          '</div>' +
        '</div>' +
        '<span class="material-symbols-outlined" ' +
          'style="color:var(--text-muted); font-size:20px; flex-shrink:0;">' +
          'chevron_right' +
        '</span>' +
      '</div>';
  });

  html += '</div>';
  container.innerHTML = html;
}

// ── Ver detalle ───────────────────────────────────────────────
async function viewActivityDetail(id) {
  if (!id) return;
  try {
    var result = await runServer('webAppGetActividad', { id: id });
    if (!result || !result.ok || !result.data) {
      alert('No se pudo cargar la actividad.');
      return;
    }
    showForm('actividades', id);
  } catch (err) {
    console.error('viewActivityDetail:', err);
    alert('Error al cargar la actividad.');
  }
}

// ── Búsqueda global delegada ──────────────────────────────────
function onGlobalSearch_activities(value) {
  var cards = document.querySelectorAll(
    '#activities-list-content .dash-activity-card'
  );
  var q = (value || '').toLowerCase();
  cards.forEach(function(card) {
    var match = card.textContent.toLowerCase().indexOf(q) >= 0;
    card.style.display = match ? '' : 'none';
  });
}
</script>
