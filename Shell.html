<div id="app-shell" class="app-shell hidden">

  <aside class="sidebar">
    <div class="brand-logo">
      Rocío Agrocontrol
      <span class="brand-sub">INTELIGENCIA DE CAMPO</span>
    </div>

    <nav class="nav-menu">
      <div class="nav-item active" data-view="dashboard"
           onclick="navigateTo('dashboard','Inteligencia Operativa','Resumen del Panel')">
        <span class="material-symbols-outlined">dashboard</span> Panel
      </div>
      <div class="nav-item" data-view="activities"
           onclick="navigateTo('activities','Actividades','Gestión de Tareas')">
        <span class="material-symbols-outlined">agriculture</span> Actividades
      </div>
      <div class="nav-item" data-view="campos"
           onclick="navigateTo('campos','Campos','Gestión de Terrenos')">
        <span class="material-symbols-outlined">map</span> Campos
      </div>
      <div class="nav-item" data-view="campanias"
           onclick="navigateTo('campanias','Campañas','Ciclo Productivo')">
        <span class="material-symbols-outlined">calendar_today</span> Campañas
      </div>
      <div class="nav-item" data-view="cosechas"
           onclick="navigateTo('cosechas','Cosechas','Producción Final')">
        <span class="material-symbols-outlined">grass</span> Cosechas
      </div>
      <div class="nav-item" data-view="ventas"
           onclick="navigateTo('ventas','Ventas','Comercialización')">
        <span class="material-symbols-outlined">trending_up</span> Ventas
      </div>
      <div class="nav-item" data-view="recursos"
           onclick="navigateTo('recursos','Recursos','Personal, Insumos y Equipos')">
        <span class="material-symbols-outlined">inventory_2</span> Recursos
      </div>
      <div class="nav-item" data-view="alertas"
           onclick="navigateTo('alertas','Alertas','Monitoreo Crítico')">
        <span class="material-symbols-outlined">notifications</span> Alertas
      </div>
    </nav>

    <div class="sidebar-footer">
      <div id="sidebar-user" class="sidebar-user-info"></div>
      <button class="btn btn-secondary" style="width:100%;" onclick="doLogout()">
        <span class="material-symbols-outlined">logout</span> Cerrar Sesión
      </button>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <div>
        <h2 id="page-title"
            style="font-family:Manrope;font-weight:800;color:var(--primary-color);margin:0;">
          Inteligencia Operativa
        </h2>
        <span id="page-subtitle" style="color:var(--text-muted);font-size:13px;">
          Resumen del Panel
        </span>
      </div>
      <div style="display:flex;align-items:center;gap:16px;">
        <div class="search-box">
          <span class="material-symbols-outlined">search</span>
          <input type="text" id="global-search"
                 placeholder="Buscar registros..."
                 oninput="handleGlobalSearch(this.value)">
        </div>
        <div id="top-user-badge" class="user-badge" title="Usuario activo">?</div>
      </div>
    </header>

    <div id="view-loading" class="view-loading hidden">
      <div style="text-align:center;">
        <div class="spinner" style="margin:0 auto 12px;"></div>
        <p style="color:var(--text-muted);font-size:14px;">Cargando...</p>
      </div>
    </div>

    <div id="page-content" class="content-area"></div>
  </main>
</div>

<style>
  .sidebar-footer {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid #e3f3d2;
  }
  .sidebar-user-info {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 12px;
    padding: 0 4px;
    line-height: 1.6;
  }
  .user-badge {
    background: var(--primary-color);
    color: white;
    border-radius: 50%;
    width: 36px; height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    flex-shrink: 0;
    user-select: none;
  }
  .view-loading {
    position: absolute;
    inset: 0;
    background: rgba(245,252,240,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(2px);
  }
  .view-loading.hidden { display: none; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #e3f3d2;
    border-top-color: var(--primary-color);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: capitalize;
  }
  .badge--pendiente       { background:#fef9c3; color:#854d0e; }
  .badge--pendiente_venta { background:#fef9c3; color:#854d0e; }
  .badge--en_proceso      { background:#dbeafe; color:#1e40af; }
  .badge--planificada     { background:#dbeafe; color:#1e40af; }
  .badge--completada      { background:#dcfce7; color:#166534; }
  .badge--activo          { background:#dcfce7; color:#166534; }
  .badge--activa          { background:#dcfce7; color:#166534; }
  .badge--registrada      { background:#dcfce7; color:#166534; }
  .badge--vendida         { background:#d1fae5; color:#065f46; }
  .badge--finalizada      { background:#e0e7ff; color:#3730a3; }
  .badge--anulada         { background:#fee2e2; color:#991b1b; }
  .badge--inactivo        { background:#f3f4f6; color:#6b7280; }
  .progress-bar-wrap {
    background: #e3f3d2;
    border-radius: 4px;
    height: 6px;
    margin-top: 4px;
  }
  .progress-bar-fill {
    height: 6px;
    border-radius: 4px;
    transition: width 0.6s ease;
  }
  .list-table { width:100%; border-collapse:collapse; }
  .list-table th {
    background: #f0f7ea;
    padding: 10px 14px;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .list-table td {
    padding: 12px 14px;
    border-bottom: 1px solid #f0f7ea;
    font-size: 14px;
  }
  .list-table tr:last-child td { border-bottom: none; }
  .list-table tr:hover td { background: #fafff7; }
  .card {
    background: white;
    border-radius: 16px;
    border: 1px solid #e3f3d2;
    padding: 20px;
  }
  .skeleton-line {
    height: 16px;
    background: linear-gradient(90deg,#e3f3d2 25%,#f0f7ea 50%,#e3f3d2 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px;
    margin-bottom: 8px;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .dash-activity-card {
    background: white;
    border: 1px solid #e3f3d2;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.15s;
  }
  .dash-activity-card:hover {
    box-shadow: 0 4px 12px rgba(0,54,34,0.08);
    transform: translateY(-1px);
  }
  .widget {
    background: white;
    border-radius: 16px;
    border: 1px solid #e3f3d2;
    padding: 18px;
  }
</style>

<script>
// ============================================================
// SHELL — Router Central
// ============================================================

var _currentView = null;

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g,  '&amp;')
    .replace(/</g,  '&lt;')
    .replace(/>/g,  '&gt;')
    .replace(/"/g,  '&quot;')
    .replace(/'/g,  '&#39;');
}

var VIEW_RENDERERS = {
  'dashboard':  'renderDashboardView',
  'activities': 'renderActivitiesView',
  'campos':     'renderCamposView',
  'campanias':  'renderCampaniasView',
  'cosechas':   'renderCosechasView',
  'ventas':     'renderVentasView',
  'recursos':   'renderResourcesView',
  'alertas':    'renderAlertasView'
};

function showAppShell() {
  var shell = document.getElementById('app-shell');
  var login = document.getElementById('login-screen');
  if (login) login.classList.add('hidden');
  if (shell) shell.classList.remove('hidden');

  try {
    var user     = JSON.parse(sessionStorage.getItem('user') || '{}');
    var nombre   = escapeHtml(user.nombre   || 'Usuario');
    var apellido = escapeHtml(user.apellido || '');
    var rol      = escapeHtml(user.rol      || '');
    var inicial  = escapeHtml((user.nombre  || 'U').charAt(0).toUpperCase());

    var sidebarUser = document.getElementById('sidebar-user');
    if (sidebarUser) {
      sidebarUser.innerHTML =
        '<strong>' + nombre + ' ' + apellido + '</strong><br>' +
        '<span style="font-size:10px;text-transform:capitalize;">' + rol + '</span>';
    }
    var badge = document.getElementById('top-user-badge');
    if (badge) badge.textContent = inicial;
  } catch(e) {
    console.warn('showAppShell: no se pudo leer usuario de sesión', e);
  }

  navigateTo('dashboard', 'Inteligencia Operativa', 'Resumen del Panel');
}

function showLogin() {
  sessionStorage.clear();
  var shell = document.getElementById('app-shell');
  var login = document.getElementById('login-screen');
  if (shell) shell.classList.add('hidden');
  if (login) login.classList.remove('hidden');
}

function navigateTo(view, title, subtitle) {
  var titleEl    = document.getElementById('page-title');
  var subtitleEl = document.getElementById('page-subtitle');
  if (titleEl)    titleEl.textContent    = title    || view;
  if (subtitleEl) subtitleEl.textContent = subtitle || '';

  document.querySelectorAll('.nav-item[data-view]').forEach(function(el) {
    el.classList.toggle('active', el.dataset.view === view);
  });

  _currentView = view;
  loadView(view);
}

function loadView(view) {
  var content = document.getElementById('page-content');
  if (!content) return;

  showViewLoading(true);
  content.innerHTML = '';

  var rendererName = VIEW_RENDERERS[view];
  var renderer     = (typeof rendererName === 'string')
    ? window[rendererName]
    : rendererName;

  if (typeof renderer !== 'function') {
    content.innerHTML = buildComingSoon(view);
    showViewLoading(false);
    return;
  }

  try {
    var result = renderer(content);
    if (result && typeof result.then === 'function') {
      result
        .catch(function(err) { showViewError(content, view, err); })
        .finally(function()  { showViewLoading(false); });
    } else {
      showViewLoading(false);
    }
  } catch(err) {
    showViewError(content, view, err);
    showViewLoading(false);
  }
}

function showViewLoading(show) {
  var el = document.getElementById('view-loading');
  if (el) el.classList.toggle('hidden', !show);
}

function showViewError(container, view, err) {
  console.error('[Vista:' + view + ']', err);
  var msg = escapeHtml(err ? (err.message || String(err)) : 'Error desconocido');
  container.innerHTML =
    '<div style="text-align:center;padding:60px 20px;">' +
      '<span class="material-symbols-outlined" style="font-size:48px;color:#ba1a1a;">error</span>' +
      '<h3 style="margin:16px 0 8px;color:#ba1a1a;">Error al cargar la vista</h3>' +
      '<p style="color:var(--text-muted);font-size:14px;">' + msg + '</p>' +
      '<button class="btn btn-primary" style="margin-top:20px;" ' +
        'onclick="loadView(\'' + escapeHtml(view) + '\')">Reintentar</button>' +
    '</div>';
}

function buildComingSoon(view) {
  return '<div style="text-align:center;padding:80px 20px;">' +
    '<span class="material-symbols-outlined" ' +
      'style="font-size:64px;color:var(--accent-color);">construction</span>' +
    '<h3 style="margin:20px 0 8px;font-family:Manrope;font-size:24px;">Vista en construcción</h3>' +
    '<p style="color:var(--text-muted);">El módulo <strong>' +
      escapeHtml(view) + '</strong> estará disponible pronto.</p>' +
  '</div>';
}

function doLogout() {
  var token = sessionStorage.getItem('token');
  if (token) {
    runServer('webAppLogout', { token: token }).catch(function(){});
  }
  showLogin();
}

function handleGlobalSearch(value) {
  var handlerName = 'onGlobalSearch_' + _currentView;
  if (typeof window[handlerName] === 'function') {
    window[handlerName](value);
  }
}

function runServer(fnName, args) {
  return new Promise(function(resolve, reject) {
    var runner = google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(function(err) {
        console.error('[runServer:' + fnName + ']', err);
        reject(err);
      });

    if (args !== undefined && args !== null) {
      runner[fnName](args);
    } else {
      runner[fnName]();
    }
  });
}

function showForm(type, id) {
  if (typeof _showFormModal === 'function') {
    _showFormModal(type, id);
  } else {
    console.warn('showForm: _showFormModal no disponible');
  }
}
</script>
